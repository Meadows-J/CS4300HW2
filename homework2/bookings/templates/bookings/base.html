<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Movie Theater Booking{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            color-scheme: light;
        }
        body {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
            font-family: 'Arial', sans-serif;
        }
        .navbar {
            background-color: #d62828 !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffffff !important;
        }
        .nav-link {
            color: #ffffff !important;
        }
        .container {
            max-width: 1000px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .card {
            background-color: #2a2a2a !important;
            border: 1px solid #444 !important;
            border-radius: 8px;
            transition: transform 0.3s ease;
            color: #ffffff !important;
        }
        .card-title {
            color: #ffffff !important;
        }
        .card-text {
            color: #ffffff !important;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(214, 40, 40, 0.3);
        }
        .btn-primary {
            background-color: #d62828 !important;
            border-color: #d62828 !important;
            color: #ffffff !important;
        }
        .btn-primary:hover {
            background-color: #c41e1e !important;
            border-color: #c41e1e !important;
        }
        .btn-secondary {
            color: #ffffff !important;
        }
        .list-group-item {
            background-color: #2a2a2b !important;
            border-color: #444 !important;
            color: #ffffff !important;
        }
        .list-group-item:hover {
            background-color: #333 !important;
        }
        h1, h2, h3, h4, h5, h6 {
            color: #d62828 !important;
        }
        h1 {
            margin-bottom: 2rem;
            font-weight: bold;
        }
        h2 {
            margin-bottom: 2rem;
            font-weight: bold;
        }
        .footer {
            background-color: #0a0a0a !important;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid #444 !important;
            color: #ffffff !important;
        }
        .alert {
            background-color: #d62828 !important;
            border: none !important;
            color: white !important;
        }
        .alert-info {
            background-color: #004085 !important;
            border-color: #003366 !important;
        }
        strong {
            color: #ffffff !important;
        }
        p {
            color: #ffffff !important;
        }
        li {
            color: #ffffff !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'bookings:movie_list' %}">🎬 Movie Theater Booking</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'bookings:movie_list' %}">Movies</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'bookings:booking_history' %}">Bookings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>Movie Theater Booking System</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
