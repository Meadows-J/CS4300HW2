{% extends 'bookings/base.html' %}

{% block title %}Movie Theater Booking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-center">
                <h3>Welcome to Movie Theater Booking</h3>
            </div>
            <div class="card-body">
                <p class="text-center">Browse our selection of movies and book your favorite seats.</p>
                <a href="{% url 'bookings:movie_list' %}" class="btn btn-primary w-100">Browse Movies</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
